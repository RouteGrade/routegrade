version: 2

models:
  - name: dim_users
    description: >
      RouteGrade user dimension. One row per user with only analytics-safe
      fields. No email, avatar, or display name.
    columns:
      - name: user_id
        description: RouteGrade user ID.
        tests:
          - unique
          - not_null
      - name: auth_provider
        description: Provider that authenticated the user.
        tests:
          - not_null
          - accepted_values:
              config:
                severity: warn
              arguments:
                values: ["google", "email"]
      - name: signup_at
        description: Timestamp of first RouteGrade profile provisioning.
        tests:
          - not_null
      - name: signup_date
        description: Calendar date of signup_at (UTC).
        tests:
          - not_null
      - name: last_profile_updated_at
        description: When any field on the profile was last synchronized.

  - name: fct_daily_user_signups
    description: >
      Daily count of new RouteGrade users, split by authentication provider.
      One row per (signup_date, auth_provider).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - signup_date
              - auth_provider
    columns:
      - name: signup_date
        description: Calendar date (UTC) new users signed up on.
        tests:
          - not_null
      - name: auth_provider
        description: Provider used for the signup.
        tests:
          - not_null
      - name: new_users
        description: Count of distinct users signed up on that date via that provider.
        tests:
          - not_null

  - name: dim_routes
    description: >
      Saved-route dimension. One row per saved route with analytics-safe
      fields only — no starting address, geometry, or route name.
    columns:
      - name: route_id
        description: Saved route ID.
        tests:
          - unique
          - not_null
      - name: user_id
        description: Owning user; joins to dim_users.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id
      - name: preference
        description: Requested vibe.
        tests:
          - accepted_values:
              arguments:
                values: ["quiet", "flat", "scenic"]
      - name: distance_bucket
        description: Coarse distance band for reporting.
        tests:
          - accepted_values:
              arguments:
                values:
                  - "short (<3 km)"
                  - "medium (3-7 km)"
                  - "long (7-12 km)"
                  - "very long (12+ km)"
      - name: grade
        description: Letter grade at save time.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["A", "B", "C", "D"]
      - name: provider
        description: Routing engine that produced the geometry.
        tests:
          - not_null
      - name: saved_at
        description: Timestamp the route was saved.
        tests:
          - not_null
      - name: saved_date
        description: Calendar date (UTC) of saved_at.
        tests:
          - not_null
      - name: signup_at
        description: Owning user's signup timestamp (from dim_users).

  - name: fct_route_scores_daily
    description: >
      Daily distribution of saved-route grades. One row per (saved_date, grade)
      with counts and mean distance / score / climb.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - saved_date
              - grade
    columns:
      - name: saved_date
        description: Calendar date (UTC) routes were saved on.
        tests:
          - not_null
      - name: grade
        description: Letter grade bucket.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["A", "B", "C", "D"]
      - name: routes_saved
        description: Count of routes saved that day with that grade.
        tests:
          - not_null
      - name: avg_distance_km
        description: Mean route distance for the bucket.
      - name: avg_score
        description: Mean numeric score for the bucket.
      - name: avg_elevation_gain_m
        description: Mean climb for the bucket.

  - name: dim_runs
    description: >
      Recorded-run dimension. One row per run with analytics-safe fields only
      — no GPS trace, splits, or route name.
    columns:
      - name: run_id
        description: Recorded run ID.
        tests:
          - unique
          - not_null
      - name: user_id
        description: Owning user; joins to dim_users.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id
      - name: route_id
        description: >
          Saved route the run followed, when any. Loose pointer — warns (not
          fails) on runs whose route was later deleted.
        tests:
          - relationships:
              config:
                severity: warn
              arguments:
                to: ref('dim_routes')
                field: route_id
      - name: followed_saved_route
        description: True when the run was recorded against a saved route.
        tests:
          - not_null
      - name: distance_km
        description: Recorded distance in km.
        tests:
          - not_null
      - name: distance_bucket
        description: Coarse distance band for reporting.
        tests:
          - accepted_values:
              arguments:
                values:
                  - "short (<3 km)"
                  - "medium (3-7 km)"
                  - "long (7-12 km)"
                  - "very long (12+ km)"
      - name: duration_s
        description: Total elapsed run time in seconds.
        tests:
          - not_null
      - name: pace_s_per_km
        description: >
          Seconds per km — client-reported average, or derived from
          duration/distance. Null for zero-distance runs.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: started_at
        description: Timestamp the run started.
        tests:
          - not_null
      - name: run_date
        description: Calendar date (UTC) of started_at.
        tests:
          - not_null
      - name: signup_at
        description: Owning user's signup timestamp (from dim_users).

  - name: fct_runs_daily
    description: >
      Daily run activity. One row per run_date with run counts, distinct
      runners, total distance / duration, and a duration-weighted average
      pace.
    columns:
      - name: run_date
        description: Calendar date (UTC) runs started on.
        tests:
          - unique
          - not_null
      - name: runs_count
        description: Count of runs recorded that day.
        tests:
          - not_null
      - name: distinct_runners
        description: Count of distinct users who ran that day.
        tests:
          - not_null
      - name: total_distance_km
        description: Total distance recorded that day.
        tests:
          - not_null
      - name: total_duration_s
        description: Total run time recorded that day, in seconds.
        tests:
          - not_null
      - name: avg_pace_s_per_km
        description: >
          Duration-weighted average pace (total seconds / total km). Null when
          all recorded distance that day is zero.
