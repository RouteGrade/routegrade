version: 2

sources:
  - name: routegrade_ops
    description: >
      RouteGrade operational database. Owned by FastAPI + Alembic.
      dbt reads from this schema; it never writes to it.
    database: "{{ env_var('DBT_POSTGRES_DATABASE', 'postgres') }}"
    schema: public

    tables:
      - name: user_profiles
        description: >
          One row per authenticated RouteGrade user. Populated idempotently by
          FastAPI's PUT /v1/users/me after Supabase login. Never modified by
          dbt or the browser.
        columns:
          - name: user_id
            description: Primary key; mirrors auth.users.id (Supabase).
            tests:
              - unique
              - not_null
          - name: email
            description: >
              Verified email from the identity token. Not exposed in analytics
              models — see stg_user_profiles for the safe projection.
            tests:
              - not_null
          - name: auth_provider
            description: Provider that authenticated the user, e.g. `google` or `email`.
            tests:
              - not_null
          - name: created_at
            description: When the RouteGrade profile row was first inserted (TZ-aware).
            tests:
              - not_null
          - name: updated_at
            description: When any field was last synchronized.
            tests:
              - not_null

      - name: saved_routes
        description: >
          One row per route a signed-in user saved. Written by FastAPI's
          PUT /v1/users/me/routes/:id. Contains PII (starting_address) and
          bulky geometry — both are dropped in stg_saved_routes and must never
          reach a mart.
        columns:
          - name: id
            description: Primary key; planner-issued route UUID.
            tests:
              - unique
              - not_null
          - name: user_id
            description: Owning user; mirrors auth.users.id (Supabase).
            tests:
              - not_null
          - name: name
            description: User-visible route name (1-120 chars).
            tests:
              - not_null
          - name: starting_address
            description: >
              Address as the user typed it. PII — excluded from staging and all
              downstream models.
          - name: distance_km
            description: Real distance of the generated geometry.
            tests:
              - not_null
          - name: preference
            description: Requested vibe — quiet / flat / scenic.
            tests:
              - not_null
          - name: geometry
            description: GeoJSON LineString (JSONB). Excluded from staging.
          - name: elevation_gain_m
            description: Total climb in metres.
            tests:
              - not_null
          - name: score
            description: Numeric score (0-100) from scoring function v1.
            tests:
              - not_null
          - name: grade
            description: Letter grade A/B/C/D derived from the score.
            tests:
              - not_null
          - name: created_at
            description: When the route was first saved (TZ-aware).
            tests:
              - not_null
          - name: updated_at
            description: When the saved route was last replaced.
            tests:
              - not_null

      - name: runs
        description: >
          One row per completed run a signed-in user recorded (MVP 5, Nike-Run-
          Club-style tracking). Written by FastAPI's runs endpoints. Contains
          the recorded GPS trace (path) and per-km splits — both are dropped in
          stg_runs and must never reach a mart.
        columns:
          - name: id
            description: Primary key; client-issued run UUID.
            tests:
              - unique
              - not_null
          - name: user_id
            description: Owning user; mirrors auth.users.id (Supabase).
            tests:
              - not_null
          - name: route_id
            description: >
              Loose pointer to the saved route the run followed. Intentionally
              not a foreign key so deleting a saved route keeps run history
              intact. Null for free runs.
          - name: route_name
            description: >
              Route name snapshotted at run time. User-editable free text —
              excluded from marts (same policy as saved_routes.name).
          - name: started_at
            description: When the run started (TZ-aware).
            tests:
              - not_null
          - name: duration_s
            description: Total elapsed run time in seconds (> 0 by check constraint).
            tests:
              - not_null
          - name: distance_km
            description: Recorded distance (>= 0 by check constraint).
            tests:
              - not_null
          - name: avg_pace_s_per_km
            description: >
              Average pace in seconds per km as reported by the client; null
              when the client did not compute one.
          - name: splits
            description: >
              JSONB array of per-km splits ({"km": 1, "duration_s": 342}).
              Bulky — excluded from staging.
          - name: path
            description: >
              Recorded GPS trace as GeoJSON (JSONB). PII-adjacent location
              data — excluded from staging and all downstream models.
          - name: created_at
            description: When the run row was first inserted (TZ-aware).
            tests:
              - not_null
          - name: updated_at
            description: When the run row was last modified.
            tests:
              - not_null
