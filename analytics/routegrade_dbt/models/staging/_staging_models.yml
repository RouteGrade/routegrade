version: 2

models:
  - name: stg_user_profiles
    description: >
      Staging view for RouteGrade user profiles. One row per user_id; excludes
      email and avatar_url so they do not propagate into marts.
    columns:
      - name: user_id
        description: RouteGrade user ID (mirrors auth.users.id).
        tests:
          - unique
          - not_null
      - name: display_name
        description: User-editable display name (may be null).
      - name: auth_provider
        description: Provider that authenticated the user.
        tests:
          - not_null
          - accepted_values:
              # Allow the test to warn (not fail) if a future provider is
              # added upstream before this list is expanded.
              config:
                severity: warn
              arguments:
                values: ["google", "email"]
      - name: created_at
        description: When the profile row was first inserted.
        tests:
          - not_null
      - name: updated_at
        description: When the profile row was last synchronized.

  - name: stg_saved_routes
    description: >
      Staging view for saved routes. One row per route_id; excludes
      starting_address (PII) and geometry (bulky, no aggregate use) so neither
      propagates into marts.
    columns:
      - name: route_id
        description: Saved route ID (planner-issued UUID).
        tests:
          - unique
          - not_null
      - name: user_id
        description: Owning RouteGrade user.
        tests:
          - not_null
      - name: distance_km
        description: Real distance of the generated geometry.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: preference
        description: Requested vibe.
        tests:
          - accepted_values:
              arguments:
                values: ["quiet", "flat", "scenic"]
      - name: elevation_gain_m
        description: Total climb in metres.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: score
        description: Numeric score, 0-100.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true
      - name: grade
        description: Letter grade.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["A", "B", "C", "D"]
      - name: created_at
        description: When the route was first saved.
        tests:
          - not_null

  - name: stg_runs
    description: >
      Staging view for recorded runs. One row per run_id; excludes path (GPS
      trace — PII-adjacent) and splits (bulky JSONB) so neither propagates
      into marts.
    columns:
      - name: run_id
        description: Recorded run ID (client-issued UUID).
        tests:
          - unique
          - not_null
      - name: user_id
        description: Owning RouteGrade user.
        tests:
          - not_null
      - name: route_id
        description: >
          Loose pointer to the saved route followed; null for free runs and
          may dangle if the route was later deleted.
      - name: route_name
        description: >
          Route name snapshotted at run time (user free text — dropped in
          dim_runs, same policy as saved-route names).
      - name: started_at
        description: When the run started.
        tests:
          - not_null
      - name: duration_s
        description: Total elapsed run time in seconds.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: distance_km
        description: Recorded distance in km.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: avg_pace_s_per_km
        description: Client-reported average pace in seconds per km (nullable).
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
      - name: created_at
        description: When the run row was first inserted.
        tests:
          - not_null
