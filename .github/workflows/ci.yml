name: CI

# Runs the API and web test suites on every PR and on pushes to main. Until now
# the suites (169 pytest, 63 vitest, the Playwright E2E) only ran locally, which
# let the E2E suite go silently red once. This makes them a merge gate.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check app
      - name: Pytest
        run: uv run pytest -q

  web:
    name: Web — types, lint, unit, build, e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm lint
      - name: Unit tests (vitest)
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E tests (Playwright)
        run: pnpm test:e2e
